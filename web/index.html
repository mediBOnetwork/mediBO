<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <!-- Early connection to back-end services so the first Supabase query
       doesn't pay a full DNS + TLS round-trip after Flutter boots. -->
  <link rel="preconnect" href="https://qkcuoaqrpnmdnejzahdv.supabase.co">
  <link rel="dns-prefetch" href="https://qkcuoaqrpnmdnejzahdv.supabase.co">
  <link rel="preconnect" href="https://generativelanguage.googleapis.com">
  <link rel="dns-prefetch" href="https://generativelanguage.googleapis.com">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="B2B Pharmacy ordering platform">
  <meta name="autocomplete" content="off">

  <!-- Force browsers to always check for a fresh version instead of
       serving index.html from cache. The _headers / server config should
       set the same policy via HTTP headers, but these meta tags act as a
       belt-and-suspenders fallback for proxies and older mobile browsers. -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- PWA theme color (Android Chrome address bar + status bar) -->
  <meta name="theme-color" content="#1D9E75">
  <meta name="application-name" content="mediBO">

  <!-- iOS PWA meta tags -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="mediBO">
  <!-- black-translucent lets Flutter content extend behind the iOS status bar -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- iOS touch icons (Safari "Add to Home Screen") -->
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">

  <style>
    /* Disable the dark flash that mobile browsers show on tap */
    * {
      -webkit-tap-highlight-color: transparent !important;
      -webkit-touch-callout: none;
      tap-highlight-color: transparent !important;
    }
    body {
      margin: 0;
      background-color: #ffffff;
      -webkit-tap-highlight-color: transparent !important;
    }
    flt-glass-pane {
      -webkit-tap-highlight-color: transparent !important;
    }
  </style>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">

  <title>mediBO</title>
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <div id="recaptcha-widget" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;background:white;padding:24px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.3);text-align:center;">
    <p style="margin-bottom:16px;font-weight:600;font-family:sans-serif;font-size:16px;">Please verify to load more</p>
    <div id="recaptcha-container"></div>
    <button onclick="closeRecaptcha()" style="margin-top:16px;width:100%;padding:10px;border:1px solid #ccc;border-radius:6px;cursor:pointer;font-size:14px;">Cancel</button>
  </div>
  <div id="recaptcha-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9998;" onclick="closeRecaptcha()"></div>

  <script src="flutter_bootstrap.js?v=20260530" async></script>
  <script>
    var recaptchaResolve = null;
    var recaptchaWidgetId = null;

    function showRecaptcha(callback) {
      recaptchaResolve = callback;
      document.getElementById('recaptcha-widget').style.display = 'block';
      document.getElementById('recaptcha-overlay').style.display = 'block';
      if (recaptchaWidgetId === null) {
        recaptchaWidgetId = grecaptcha.render('recaptcha-container', {
          sitekey: '6LcgmgAtAAAAANRdpsgvzSzu9Zwvh4L3o1wB5ykp',
          callback: recaptchaCallback,
          'expired-callback': recaptchaExpired,
          theme: 'light',
        });
      } else {
        grecaptcha.reset(recaptchaWidgetId);
      }
    }
    function closeRecaptcha() {
      document.getElementById('recaptcha-widget').style.display = 'none';
      document.getElementById('recaptcha-overlay').style.display = 'none';
      if (recaptchaResolve) {
        recaptchaResolve(null);
        recaptchaResolve = null;
      }
    }
    function recaptchaCallback(token) {
      document.getElementById('recaptcha-widget').style.display = 'none';
      document.getElementById('recaptcha-overlay').style.display = 'none';
      if (recaptchaResolve) {
        recaptchaResolve(token);
        recaptchaResolve = null;
      }
    }
    function recaptchaExpired() {
      if (recaptchaResolve) {
        recaptchaResolve(null);
        recaptchaResolve = null;
      }
    }
  </script>
  <script>
    // Intercept wheel events on the Flutter canvas and replay them at 40% speed
    // so one mouse-wheel tick scrolls a natural distance without overshoot.
    // We wait 3 s for Flutter to mount its element before attaching.
    window.addEventListener('load', function () {
      setTimeout(function () {
        var target = document.querySelector('flt-glass-pane') ||
                     document.querySelector('canvas');
        if (!target) return;
        target.addEventListener('wheel', function (e) {
          e.preventDefault();
          e.stopPropagation();
          target.dispatchEvent(new WheelEvent('wheel', {
            deltaY:    e.deltaY    * 0.4,
            deltaX:    e.deltaX    * 0.4,
            deltaMode: e.deltaMode,
            bubbles:   true,
            cancelable: true,
          }));
        }, { passive: false });
      }, 3000);
    });
  </script>
  <script>
    function openRazorpay(amount, name, email, phone, callback) {
      var options = {
        key: 'rzp_test_Sui4xL8jGTDxav',
        amount: amount,
        currency: 'INR',
        name: 'mediBO',
        description: 'Medicine Order',
        prefill: {
          name: name || '',
          email: email || '',
          contact: phone || ''
        },
        theme: { color: '#1B5E20' },
        handler: function(response) {
          callback('success', response.razorpay_payment_id || '', '', '');
        },
        modal: {
          ondismiss: function() {
            callback('dismissed', '', '', '');
          }
        }
      };
      var rzp = new Razorpay(options);
      rzp.on('payment.failed', function(response) {
        var desc = (response.error && response.error.description) ? response.error.description : 'Payment failed';
        callback('failed', '', desc, '');
      });
      rzp.open();
    }
  </script>
</body>
</html>
